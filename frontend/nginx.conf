# Upstream para el backend API
upstream api {
    server api:5000;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 10M;

    # Servir archivos estáticos
    location / {
        root /usr/share/nginx/html;

        # Try files: si no existe, servir index.html
        # Esto permite que React Router maneje todas las rutas
        try_files $uri $uri/ /index.html;

        # No cachear index.html (para obtener versiones nuevas)
        location = /index.html {
            add_header Cache-Control "public, max-age=0, must-revalidate";
        }

        # Cache agresivo para assets (JS, CSS, imágenes)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Proxy inverso para API
    location /api/ {
        proxy_pass http://api:5000/api/;
        proxy_http_version 1.1;

        # Headers para mantener conexiones activas
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;

        # Headers de información de la solicitud original
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Configuración de timeouts y buffering
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # Healthcheck endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

services:
  postgres:
    image: postgres:16-alpine
    container_name: automation-hub-postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: automation_hub
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - automation-hub-network

  redis:
    image: redis:7-alpine
    container_name: automation-hub-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - automation-hub-network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: automation-hub-api
    ports:
      - "8085:5000"
    environment:
      PORT: 5000
      CORS_ORIGINS: http://localhost:4444
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/automation_hub
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
      LOG_LEVEL: debug
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run start:dev
    networks:
      - automation-hub-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: automation-hub-frontend
    ports:
      - "4444:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/.env:/app/.env
    environment:
      VITE_API_URL: http://localhost:8085
    depends_on:
      - api
    command: npm run dev -- --host 0.0.0.0
    networks:
      - automation-hub-network

volumes:
  postgres_data:
  redis_data:


networks:
  automation-hub-network:
    driver: bridge
